<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEMON FANBOY-shui</title>
  <link rel="icon" href="backgrounds/main/logo.png" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="backgrounds/main/mybg.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>
  <div class="overlay-vignette"></div>

  <div class="cursor-dot" id="cursor-dot"></div>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="snow-container" id="snowContainer"></div>
    <div class="enter-box">
      <div class="enter-title">CLICK TO ENTER</div>
      <div class="enter-sub">tap anywhere</div>
    </div>
  </div>

  <div class="container">
    <div class="hero">
      <div class="hero-logo">
        <a href="https://discord.gg/CTGz6KRpnb" target="_blank" rel="noreferrer">
          <img src="backgrounds/main/logo.png" alt="Demons Fanboy Logo" />
        </a>
      </div>
      <div class="hero-copy">
        <div class="hero-label">FANBOY</div>
        <div class="hero-credit">by: Shui</div>
      </div>
    </div>

    <div class="member-ticker-wrapper">
      <div class="member-ticker" id="memberTicker"></div>
    </div>

    <div id="profiles">
      <div class="loader"></div>
    </div>
  </div>

  <div class="music-player modern" id="musicPlayer">
    <button id="mainPlayBtn" style="border-radius: 50%; padding: 0; width: 32px; height: 32px;">▶</button>
    <div class="mp-volume-container" style="display: flex; align-items: center; gap: 8px;">
      <input type="range" id="mainVolume" min="0" max="1" step="0.01" value="0.5" style="width: 60px; accent-color: white; height: 2px; cursor: none !important;" />
    </div>
  </div>

  <audio id="mainAudio" loop src="music/main/main.mp3"></audio>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
